# ══════════════════════════════════════════
# GeoZone v2.0 — application.properties
# ══════════════════════════════════════════

server.port=8080
spring.application.name=geozone-api

# ── H2 (desenvolvimento) ──
spring.datasource.url=jdbc:h2:mem:geozonedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Para PostgreSQL em produção, descomente abaixo ──
# spring.datasource.url=jdbc:postgresql://localhost:5432/geozonedb
# spring.datasource.username=postgres
# spring.datasource.password=sua_senha
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JPA ──
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──
geozone.jwt.secret=geozoneSecretKey2025SuperSeguroBase64Encoded
geozone.jwt.expiration=86400000

# ── Admin ──
geozone.admin.email=admin@geozone.com.br
geozone.admin.password=GeoZone@Admin2025
geozone.admin.twofa=492817

# ── APIs Externas ──
geozone.overpass.url=https://overpass-api.de/api/interpreter
geozone.nominatim.url=https://nominatim.openstreetmap.org

# ── CORS ──
geozone.cors.origins=http://localhost:3000,http://localhost:8080

# ── Log ──
logging.level.br.com.geozone=DEBUG
logging.level.org.springframework.security=WARN
